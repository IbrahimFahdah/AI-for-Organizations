site_name: AI for Organizations
site_description: A Practical Guide for Leaders, Teams, and Developers
site_author: AI for Organizations Contributors
site_url: https://IbrahimFahdah.github.io/AI-for-Organizations/
repo_url: https://github.com/IbrahimFahdah/AI-for-Organizations
repo_name: AI-for-Organizations
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - toc.integrate
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - footnotes
  - def_list

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/IbrahimFahdah/AI-for-Organizations

extra_css:
  - assets/css/custom.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - About: about.md

  - Part 1 — Foundations:
    - Chapter 1 — What AI Really Is: part1-foundations/chapter-01-what-ai-really-is.md
    - Chapter 2 — Why AI Matters Now: part1-foundations/chapter-02-why-ai-matters-now.md
    - Chapter 3 — The Organizational Landscape: part1-foundations/chapter-03-organizational-landscape.md
    - Chapter 4 — Responsible AI and Governance: part1-foundations/chapter-04-responsible-ai.md

  - Part 2 — Leadership:
    - Chapter 5 — Creating an AI Vision: part2-leadership/chapter-05-ai-vision.md
    - Chapter 6 — Enterprise AI Strategy: part2-leadership/chapter-06-enterprise-ai-strategy.md
    - Chapter 7 — Governance and Oversight: part2-leadership/chapter-07-governance-oversight.md
    - Chapter 8 — Leading Transformation: part2-leadership/chapter-08-leading-transformation.md
    - Chapter 9 — Measuring Strategic Success: part2-leadership/chapter-09-measuring-success.md
    - Executive Toolkit: part2-leadership/toolkit.md

  - Part 3 — Management:
    - Chapter 10 — Strategy to Execution: part3-management/chapter-10-strategy-to-execution.md
    - Chapter 11 — Use Case Prioritization: part3-management/chapter-11-use-case-prioritization.md
    - Chapter 12 — Process Redesign: part3-management/chapter-12-process-redesign.md
    - Chapter 13 — Adoption and Change: part3-management/chapter-13-adoption-change.md
    - Chapter 14 — Product Management: part3-management/chapter-14-product-management.md
    - Chapter 15 — Operational Governance: part3-management/chapter-15-operational-governance.md
    - Chapter 16 — Cross-Functional Delivery: part3-management/chapter-16-cross-functional-delivery.md
    - Chapter 17 — Measuring Operational Impact: part3-management/chapter-17-measuring-operational-impact.md
    - Chapter 18 — Building an AI-Ready Organization: part3-management/chapter-18-ai-ready-organization.md
    - Management Toolkit: part3-management/toolkit.md

  - Part 4 — Developers:
    - Chapter 19 — Understanding AI Systems: part4-developers/chapter-19-understanding-ai-systems.md
    - Chapter 20 — Building AI Applications: part4-developers/chapter-20-building-ai-applications.md
    - Chapter 21 — Data and Infrastructure: part4-developers/chapter-21-data-infrastructure.md
    - Chapter 22 — Security and Reliability: part4-developers/chapter-22-security-reliability.md
